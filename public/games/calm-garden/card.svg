<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1792" viewBox="0 0 1024 1792" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - warm parchment -->
  <rect width="1024" height="1792" fill="#f5e6d3" rx="64"/>

  <!-- Inner card area - soft green -->
  <rect x="64" y="64" width="896" height="1664" fill="#74c69d" rx="48"/>

  <!-- Decorative border corners -->
  <rect x="96" y="96" width="32" height="32" fill="#2d6a4f"/>
  <rect x="96" y="1664" width="32" height="32" fill="#2d6a4f"/>
  <rect x="896" y="96" width="32" height="32" fill="#2d6a4f"/>
  <rect x="896" y="1664" width="32" height="32" fill="#2d6a4f"/>

  <!-- Title banner -->
  <rect x="128" y="160" width="768" height="160" fill="#ffffff" rx="16"/>
  <text x="512" y="260"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="60"
    font-weight="800"
    fill="#1a1a1a"
    text-anchor="middle"
    letter-spacing="-2">THE GARDENER</text>

  <!-- Sky area -->
  <rect x="160" y="520" width="704" height="300" fill="#87ceeb" rx="16" opacity="0.4"/>

  <!-- Ground area -->
  <rect x="160" y="800" width="704" height="400" fill="#2d6a4f" rx="0" opacity="0.3"/>
  <rect x="160" y="780" width="704" height="40" fill="#40916c" rx="8" opacity="0.4"/>

  <!-- Central garden scene -->
  <g transform="translate(512, 900)">
    <!-- Tree (center-left) -->
    <rect x="-120" y="-80" width="12" height="80" fill="#8b6f47" rx="2"/>
    <circle cx="-114" cy="-90" r="30" fill="#2d6a4f"/>
    <circle cx="-130" cy="-78" r="22" fill="#40916c"/>
    <circle cx="-100" cy="-78" r="22" fill="#40916c"/>
    <circle cx="-114" cy="-110" r="18" fill="#1a4d2e"/>

    <!-- Flowers -->
    <!-- Daisy -->
    <line x1="20" y1="0" x2="20" y2="-50" stroke="#40916c" stroke-width="3"/>
    <circle cx="20" cy="-55" r="8" fill="white"/>
    <circle cx="20" cy="-55" r="4" fill="#f7b267"/>

    <!-- Tulip -->
    <line x1="70" y1="0" x2="70" y2="-40" stroke="#40916c" stroke-width="3"/>
    <path d="M60,-40 Q58,-58 70,-62 Q82,-58 80,-40 Z" fill="#e63946"/>

    <!-- Poppy -->
    <line x1="-30" y1="0" x2="-30" y2="-35" stroke="#40916c" stroke-width="3"/>
    <circle cx="-30" cy="-42" r="9" fill="#f4845f"/>
    <circle cx="-30" cy="-42" r="3" fill="#1a1a1a"/>

    <!-- Sunflower -->
    <line x1="130" y1="0" x2="130" y2="-60" stroke="#40916c" stroke-width="3"/>
    <circle cx="130" cy="-65" r="12" fill="#f7b267"/>
    <circle cx="130" cy="-65" r="6" fill="#5c3d2e"/>

    <!-- Stones -->
    <ellipse cx="-60" cy="-3" rx="14" ry="8" fill="#9e9e9e"/>
    <ellipse cx="100" cy="-2" rx="18" ry="5" fill="#bdbdbd"/>

    <!-- Mushroom -->
    <rect x="-165" y="-15" width="6" height="15" fill="#f5e6d3" rx="1"/>
    <path d="M-175,-15 A13,10 0 0,1 -149,-15" fill="#e63946"/>
    <circle cx="-166" cy="-20" r="2" fill="rgba(255,255,255,0.7)"/>
    <circle cx="-158" cy="-18" r="2" fill="rgba(255,255,255,0.7)"/>

    <!-- Bush -->
    <circle cx="170" cy="-12" r="16" fill="#52b788"/>
    <circle cx="158" cy="-6" r="12" fill="#40916c"/>
    <circle cx="182" cy="-6" r="12" fill="#40916c"/>
    <!-- Berries on bush -->
    <circle cx="165" cy="-16" r="3" fill="#e63946"/>
    <circle cx="178" cy="-10" r="3" fill="#e63946"/>
  </g>

  <!-- Bottom banner -->
  <rect x="256" y="1440" width="512" height="96" fill="#ffffff" rx="16"/>
  <text x="512" y="1500"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="600"
    fill="#2d6a4f"
    text-anchor="middle">GROW</text>

  <!-- Top-left card corner symbol -->
  <text x="128" y="420"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="96"
    font-weight="700"
    fill="#ffffff"
    opacity="0.8">G</text>

  <!-- Bottom-right card corner symbol (inverted) -->
  <text x="896" y="1420"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="96"
    font-weight="700"
    fill="#ffffff"
    opacity="0.8"
    text-anchor="end"
    transform="rotate(180, 896, 1380)">G</text>
</svg>
